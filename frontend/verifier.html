<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Verificador - Aimi</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Roboto', sans-serif;
        background: #f4f7fa;
        margin: 0;
        padding: 0;
    }
    header {
        background: linear-gradient(90deg, #4a90e2, #50e3c2);
        color: white;
        padding: 20px 30px;
        text-align: center;
        font-size: 2rem;
        font-weight: 700;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    main {
        max-width: 900px;
        margin: 30px auto;
        padding: 0 15px;
    }
    .interaction {
        background: white;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        transition: transform 0.3s, box-shadow 0.3s;
        position: relative;
    }
    .interaction:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 25px rgba(0,0,0,0.1);
    }
    .question {
        font-weight: 700;
        font-size: 1.1rem;
        color: #333;
    }
    .answer {
        margin: 10px 0 15px 0;
        font-size: 1rem;
        color: #555;
    }
    .stars {
        display: flex;
        gap: 10px;
    }
    .stars button {
        font-size: 1.5rem;
        border: none;
        background: none;
        cursor: pointer;
        transition: transform 0.2s;
    }
    .stars button:hover {
        transform: scale(1.3);
    }
    .stars button[data-stars="1"] { color: #e74c3c; } /* rojo */
    .stars button[data-stars="2"] { color: #f1c40f; } /* amarillo */
    .stars button[data-stars="3"] { color: #2ecc71; } /* verde */
    .feedback {
        position: absolute;
        top: 15px;
        right: 20px;
        font-weight: 700;
        color: #4a90e2;
        opacity: 0;
        transition: opacity 0.4s, transform 0.4s;
    }
    .feedback.show {
        opacity: 1;
        transform: translateY(-10px);
    }
    @media(max-width: 600px){
        .stars button { font-size: 1.3rem; }
        header { font-size: 1.5rem; }
    }
</style>
</head>
<body>
<header>Panel Verificador - Aimi</header>
<main>
    <div id="interactions"></div>
</main>

<script>
const apiBase = "https://aimi-backend-l2u4.onrender.com";

async function loadInteractions() {
    const res = await fetch(`${apiBase}/interactions`);
    const data = await res.json();
    const container = document.getElementById("interactions");
    container.innerHTML = "";

    data.forEach(interaction => {
        if(interaction.status === "pending") {
            const div = document.createElement("div");
            div.classList.add("interaction");
            div.dataset.id = interaction.id;

            div.innerHTML = `
                <div class="question">P: ${interaction.question}</div>
                <div class="answer">R: ${interaction.answer}</div>
                <div class="stars">
                    <button data-stars="1">⭐ 1</button>
                    <button data-stars="2">⭐⭐ 2</button>
                    <button data-stars="3">⭐⭐⭐ 3</button>
                </div>
                <div class="feedback"></div>
            `;
            container.appendChild(div);

            // Agregar listener a los botones
            div.querySelectorAll(".stars button").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const stars = parseInt(btn.dataset.stars);
                    const id = interaction.id;
                    const feedback = div.querySelector(".feedback");

                    if(stars === 1) {
                        await fetch(`${apiBase}/vote/verifier`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ interaction_id: id, stars })
                        });
                        feedback.textContent = "❌ Eliminado del verificador";
                        div.remove(); // eliminar del DOM
                    } else if(stars === 2) {
                        await fetch(`${apiBase}/vote/verifier`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ interaction_id: id, stars })
                        });
                        feedback.textContent = "🔹 Se queda en verificador";
                        feedback.classList.add("show");
                        setTimeout(() => feedback.classList.remove("show"), 2000);
                    } else if(stars === 3) {
                        await fetch(`${apiBase}/vote/expert`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ interaction_id: id, stars })
                        });
                        feedback.textContent = "✅ Pasó al experto";
                        div.remove(); // eliminar del verificador
                    }
                });
            });
        }
    });
}

// Inicial
loadInteractions();
</script>
</body>
</html>
