<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Verificador - Aimi</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Highlight.js CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
<!-- Highlight.js JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
    body {
        font-family: 'Roboto', sans-serif;
        background: #f4f7fa;
        margin: 0;
        padding: 0;
    }
    header {
        background: linear-gradient(90deg, #4a90e2, #50e3c2);
        color: white;
        padding: 20px 30px;
        text-align: center;
        font-size: 2rem;
        font-weight: 700;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    main {
        max-width: 900px;
        margin: 30px auto;
        padding: 0 15px;
    }
    .interaction {
        background: white;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        transition: transform 0.3s, box-shadow 0.3s;
        position: relative;
    }
    .interaction:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 25px rgba(0,0,0,0.1);
    }
    .question {
        font-weight: 700;
        font-size: 1.1rem;
        color: #333;
    }
    .answer {
        margin: 10px 0 15px 0;
        font-size: 1rem;
        color: #555;
    }
    pre {
        position: relative;
        background: #2d2d2d;
        color: white;
        padding: 15px;
        border-radius: 10px;
        overflow-x: auto;
    }
    .copy-btn {
        position: absolute;
        top: 5px;
        right: 5px;
        font-size: 0.9rem;
        padding: 5px 10px;
        border: none;
        background: #4a90e2;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }
    .stars {
        display: flex;
        gap: 10px;
    }
    .stars button {
        font-size: 1.5rem;
        border: none;
        background: none;
        cursor: pointer;
        transition: transform 0.2s;
    }
    .stars button:hover {
        transform: scale(1.3);
    }
    .stars button[data-stars="1"] { color: #e74c3c; }
    .stars button[data-stars="2"] { color: #f1c40f; }
    .stars button[data-stars="3"] { color: #2ecc71; }
    .feedback {
        position: absolute;
        top: 15px;
        right: 20px;
        font-weight: 700;
        color: #4a90e2;
        opacity: 0;
        transition: opacity 0.4s, transform 0.4s;
    }
    .feedback.show {
        opacity: 1;
        transform: translateY(-10px);
    }
    @media(max-width: 600px){
        .stars button { font-size: 1.3rem; }
        header { font-size: 1.5rem; }
    }
</style>
</head>
<body>
<header class="header">
    Panel Verificador - Aimi
</header>

<div class="panel">

    <div class="toolbar">

        <input 
            type="text" 
            id="searchBox"
            placeholder="Buscar interacción..."
            oninput="buscar()"
            style="width: 1000px; height: 40px;"
        >

        <button id="clearAllBtn">
            Limpiar todas las conversaciones
        </button>

    </div>

    <div id="interactions"></div>

</div>
<script src="verifier.js"></script>

</body>
</html>
