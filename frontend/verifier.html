<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Verificador - Aimi</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Highlight.js CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
<!-- Highlight.js JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<style>
    body {
        font-family: 'Roboto', sans-serif;
        background: #f4f7fa;
        margin: 0;
        padding: 0;
    }
    header {
        background: linear-gradient(90deg, #4a90e2, #50e3c2);
        color: white;
        padding: 20px 30px;
        text-align: center;
        font-size: 2rem;
        font-weight: 700;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    main {
        max-width: 900px;
        margin: 30px auto;
        padding: 0 15px;
    }
    .interaction {
        background: white;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        transition: transform 0.3s, box-shadow 0.3s;
        position: relative;
    }
    .interaction:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 25px rgba(0,0,0,0.1);
    }
    .question {
        font-weight: 700;
        font-size: 1.1rem;
        color: #333;
    }
    .answer {
        margin: 10px 0 15px 0;
        font-size: 1rem;
        color: #555;
    }
    pre {
        position: relative;
        background: #2d2d2d;
        color: white;
        padding: 15px;
        border-radius: 10px;
        overflow-x: auto;
    }
    .copy-btn {
        position: absolute;
        top: 5px;
        right: 5px;
        font-size: 0.9rem;
        padding: 5px 10px;
        border: none;
        background: #4a90e2;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }
    .stars {
        display: flex;
        gap: 10px;
    }
    .stars button {
        font-size: 1.5rem;
        border: none;
        background: none;
        cursor: pointer;
        transition: transform 0.2s;
    }
    .stars button:hover {
        transform: scale(1.3);
    }
    .stars button[data-stars="1"] { color: #e74c3c; }
    .stars button[data-stars="2"] { color: #f1c40f; }
    .stars button[data-stars="3"] { color: #2ecc71; }
    .feedback {
        position: absolute;
        top: 15px;
        right: 20px;
        font-weight: 700;
        color: #4a90e2;
        opacity: 0;
        transition: opacity 0.4s, transform 0.4s;
    }
    .feedback.show {
        opacity: 1;
        transform: translateY(-10px);
    }
    @media(max-width: 600px){
        .stars button { font-size: 1.3rem; }
        header { font-size: 1.5rem; }
    }
</style>
</head>
<body>
<header>Panel Verificador - Aimi</header>
<main>
    <div id="interactions"></div>
</main>

<script>
const apiBase = "https://aimi-backend-l2u4.onrender.com";

// Escapar HTML
function escapeHTML(str) {
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

// Formatear texto y código como en index
function formatTextVerificador(text) {
    text = text.replace(/<p>/g, "")
               .replace(/<\/p>/g, "\n")
               .replace(/<strong>/g, "")
               .replace(/<\/strong>/g, "")
               .trim();

    if (text.startsWith("```")) {
        const match = text.match(/```(\w*)\n([\s\S]*?)```/);
        if (match) {
            const lang = match[1] || "";
            const code = match[2].trim();
            return `<pre><code class="language-${lang} hljs">${escapeHTML(code)}</code></pre>`;
        }
    }

    const simpleCodePatterns = ["def ", "class ", "print(", "return ", "console.log", "function "];
    if (simpleCodePatterns.some(p => text.includes(p))) {
        let lang = text.includes("def ") || text.includes("class ") ? "python" : "javascript";
        let content = text.replace(/;/g, ";\n").replace(/:/g, ":\n").trim();
        return `<pre><code class="language-${lang} hljs">${escapeHTML(content)}</code></pre>`;
    }

    const lines = text.split("\n");
    let html = "";
    lines.forEach(line => {
        line = line.trim();
        html += `<p>${line}</p>`;
    });
    return html;
}

// Agregar botón de copiar a cada bloque
function addCopyButtons() {
    document.querySelectorAll("pre").forEach(pre=>{
        if(pre.querySelector(".copy-btn")) return;
        const btn = document.createElement("button");
        btn.innerText = "Copiar";
        btn.className = "copy-btn";
        btn.onclick = () => {
            const code = pre.innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = "Copiado!";
            setTimeout(()=>btn.innerText="Copiar",1500);
        }
        pre.appendChild(btn);
    });
}

// Cargar interacciones
async function loadInteractions() {
    const res = await fetch(`${apiBase}/interactions`);
    const data = await res.json();
    const container = document.getElementById("interactions");
    container.innerHTML = "";

    data.forEach(interaction => {
        if(interaction.status === "pending") {
            const div = document.createElement("div");
            div.classList.add("interaction");
            div.dataset.id = interaction.id;

            // Usar textContent en vez de innerHTML para evitar que se muestre texto duplicado como "Copiar"
            div.appendChild(document.createElement("div")).className = "question";
            div.querySelector(".question").textContent = "P: " + interaction.question;

            const answerDiv = document.createElement("div");
            answerDiv.className = "answer";
            // Asumiendo que formatTextVerificador devuelve string con HTML, si es así, mejor asignar con innerHTML con cuidado
            // Si quieres evitar que se muestren botones "Copiar" o texto extra dentro del código, revisa que no haya append de botones extra fuera del render esperado.
            answerDiv.innerHTML = formatTextVerificador(interaction.answer);
            div.appendChild(answerDiv);

            // Crear contenedor estrellas
            const starsDiv = document.createElement("div");
            starsDiv.className = "stars";
            starsDiv.innerHTML = `
                <button data-stars="1">⭐ 1</button>
                <button data-stars="2">⭐⭐ 2</button>
                <button data-stars="3">⭐⭐⭐ 3</button>
            `;
            div.appendChild(starsDiv);

            // Feedback
            div.appendChild(document.createElement("div")).className = "feedback";

            container.appendChild(div);

            // Resaltar código dentro del answerDiv
            answerDiv.querySelectorAll('pre code').forEach(block=>{
                hljs.highlightElement(block);
            });

            // Botones de estrellas
            starsDiv.querySelectorAll("button").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const stars = parseInt(btn.dataset.stars);
                    const id = interaction.id;
                    const feedback = div.querySelector(".feedback");

                    await fetch(`${apiBase}/vote/verifier`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ interaction_id: id, stars })
                    });

                    if(stars === 1){
                        feedback.textContent = "❌ Eliminado del verificador";
                        div.remove();
                    } else if(stars === 2){
                        feedback.textContent = "🔹 Se queda en verificador";
                        feedback.classList.add("show");
                        setTimeout(()=>feedback.classList.remove("show"),2000);
                    } else if(stars === 3){
                        feedback.textContent = "✅ Pasó al experto";
                        div.remove();
                    }
                });
            });
        }
    });
}


    // Agregar botones de copiar
    addCopyButtons();
}

// Inicial
loadInteractions();

// Refrescar cada 90s
setInterval(loadInteractions, 90000);

</script>
</body>
</html>
